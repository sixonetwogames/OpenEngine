name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Build
        run: |
          emcmake cmake -B build-web -DCMAKE_BUILD_TYPE=Release -DPLATFORM=Web
          cmake --build build-web -j$(nproc)

      - name: Stage artifacts
        run: |
          mkdir -p _site
          cp build-web/dungeons.html _site/index.html
          cp build-web/dungeons.js   _site/
          cp build-web/dungeons.wasm _site/
          cp build-web/dungeons.data _site/ 2>/dev/null || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
